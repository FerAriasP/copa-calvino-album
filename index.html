<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copa Calvino Album</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <div class="app">
      <div id="status">Cargando álbum...</div>

      <div class="book-area">
        <button id="prevBtn" class="side-btn" onclick="previousPage()">‹</button>
        <div class="book" id="book"></div>
        <button id="nextBtn" class="side-btn" onclick="nextPage()">›</button>
        <button id="frontBtn" class="front-btn" onclick="goToFront()">Inicio</button>
      </div>

      <input type="file" id="fileInput" accept="image/png, image/jpeg" />
    </div>

    <script src="/main.js"></script>
  </body>
</html>
